version: '3.9'
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: botdb
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - '3000:3000'

volumes:
  db_data:
